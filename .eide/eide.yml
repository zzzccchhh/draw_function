version: "4.1"
name: ch32v307_eide_hello_world
type: RISC-V
deviceName: null
packDir: null
srcDirs:
  - src
  - sdk
  - zf_common
  - zf_components
  - zf_device
  - zf_driver
  - src/uart1
  - src/oled_ssd1306
  - src/matrix_keyboard
virtualFolder:
  name: <virtual_root>
  files:
    - path: c:/MounRiver/MounRiver_Studio2/resources/app/resources/win32/components/WCH/Toolchain/RISC-V Embedded GCC/riscv-none-embed/lib/rv32imafcxw/ilp32f/libm.a
  folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 7831a29ccc5f5eebf4d88b78c9ebcd76
targets:
  Debug:
    cppPreprocessAttrs:
      defineList: []
      incList:
        - src
        - sdk/Core
        - zf_common
        - zf_components
        - zf_device
        - zf_driver
        - sdk/Ld
        - sdk/Peripheral
        - sdk/Startup
        - src/uart1
        - src/oled_ssd1306
        - src/matrix_keyboard
      libList: []
    excludeList:
      - Startup/startup_ch32v30x_D8.S
      - sdk/Startup/startup_ch32v30x_D8.S
    settings:
      debugger: cortex-debug
    toolchain: RISCV_GCC
    toolchainConfigMap:
      RISCV_GCC:
        linkerScriptPath: sdk/Ld/Link.ld
        options:
          version: 2
          afterBuildTasks:
            - name: elf_to_lst
              abortAfterFailed: false
              command: '"${CompilerFolder}\${CompilerPrefix}objdump" --source --all-headers --demangle --disassemble "${OutDir}\${targetName}.elf" > "${OutDir}\${targetName}.lst"'
              disable: false
          asm-compiler:
            ASM_FLAGS: -Wl,-Bstatic
          beforeBuildTasks: []
          c/cpp-compiler:
            C_FLAGS: -Wl,-Bstatic
            language-c: gnu11
            language-cpp: c++20
            no-exceptions: true
            no-rtti: true
            no-threadsafe-statics: true
            no-use-cxa-atexit: true
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            optimization-lto: true
            signed-char: true
            warnings: all-warnings
          global:
            abi: ilp32f
            arch: rv32imafcxw
            code-model: medlow
            misc-control: -msmall-data-limit=8 -msave-restore -fmessage-length=0 -fsigned-char -ffunction-sections -fdata-sections -fno-common -Wunused -Wuninitialized --specs=nano.specs --specs=nosys.specs
            output-debug-info: enable
          linker:
            $toolName: auto
            LD_FLAGS: -Xlinker --gc-sections -nostartfiles
            output-format: elf
            remove-unused-input-sections: true
    uploadConfigMap:
      Custom:
        bin: ${ExecutableName}.bin
        commandLine: download.cmd ${programFile}
        eraseChipCommand: ""
      JLink:
        baseAddr: "0x08000000"
        bin: ""
        cpuInfo:
          cpuName: STM32F103C8
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: ${workspaceFolder}/tools/wch-interface
        target: ${workspaceFolder}/tools/wch-interface
    uploader: OpenOCD
